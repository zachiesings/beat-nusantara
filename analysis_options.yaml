include: package:flutter_lints/flutter.yaml

# Kept intentionally lenient: the CI `flutter analyze` step is non-blocking and
# these relaxations avoid drowning real issues in style noise.
linter:
  rules:
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false
    avoid_print: false
    use_build_context_synchronously: false
