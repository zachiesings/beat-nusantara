name: Screenshots

# Renders the 5 screenshot-mode screens to real PNGs (no device/emulator),
# uploads them as a downloadable artifact AND auto-commits them into
# marketing/screenshots/6.7/ so that folder always holds the latest UI.
# Runs on push to main (when UI/assets change) or manually.
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'test/screenshots_capture_test.dart'
      - '.github/workflows/screenshots.yml'

permissions:
  contents: write   # needed to commit the refreshed screenshots back

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fetch color emoji font (so 👋✨🎁 render, not boxes)
        run: |
          curl -fsSL https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf -o noto_emoji.ttf \
            && echo "emoji font: $(wc -c <noto_emoji.ttf) bytes" || echo "emoji font download failed (captures will show boxes for emoji)"

      - name: Capture screenshots (home/library/gameplay/result/reward .png)
        run: flutter test test/screenshots_capture_test.dart

      - name: Refresh marketing/screenshots/6.7
        run: |
          mkdir -p marketing/screenshots/6.7
          cp build/screenshots/*.png marketing/screenshots/6.7/
          ls -la marketing/screenshots/6.7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-screenshots
          path: build/screenshots/*.png
          if-no-files-found: error

      - name: Commit refreshed screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/screenshots/6.7/*.png
          if git diff --cached --quiet; then
            echo "No screenshot changes — nothing to commit."
          else
            git commit -m "chore: auto-refresh screenshots [skip ci]"
            git push origin HEAD:main
            echo "Screenshots updated in marketing/screenshots/6.7"
          fi
