name: Screenshots

# Renders the 5 screenshot-mode screens to real PNGs (no device/emulator) and
# uploads them as an artifact you can download from any browser — incl. iPhone.
# Run: Actions tab → "Screenshots" → Run workflow (or push to main).
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'test/screenshots_capture_test.dart'
      - '.github/workflows/screenshots.yml'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fetch color emoji font (so 👋✨🎁 render, not boxes)
        run: |
          curl -fsSL https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf -o noto_emoji.ttf \
            && echo "emoji font: $(wc -c <noto_emoji.ttf) bytes" || echo "emoji font download failed (captures will show boxes for emoji)"

      - name: Capture screenshots (home/library/gameplay/result/reward .png)
        run: flutter test test/screenshots_capture_test.dart

      - name: List output
        run: ls -la build/screenshots || true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-screenshots
          path: build/screenshots/*.png
          if-no-files-found: error
