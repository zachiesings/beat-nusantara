name: Build APK

# Builds a release APK + AAB on every push/PR to main, or manually.
# Platform folders (android/ios) are GENERATED here via `flutter create`, so the
# repo only tracks lib/ + assets/ (see README).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate platform folders
        run: flutter create --org com.beatnusantara --project-name beat_nusantara --platforms=android,ios .

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true

      - name: Static analysis (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Tests
        run: |
          rm -f test/widget_test.dart   # remove the stub flutter-create generates (refs MyApp)
          flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
