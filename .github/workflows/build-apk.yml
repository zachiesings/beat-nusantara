name: Build APK

# Builds a release APK + AAB on every push/PR to main, or manually.
# Platform folders (android/ios) are GENERATED here via `flutter create`, so the
# repo only tracks lib/ + assets/ (see README).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate platform folders
        run: flutter create --org com.beatnusantara --project-name beat_nusantara --platforms=android,ios .

      - name: Pin Gradle 8.x + AGP 8.7 (google_mobile_ads isn't Gradle-9 ready)
        run: |
          sed -i 's#gradle-[0-9.]*-all\.zip#gradle-8.10.2-all.zip#' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/id("com.android.application") version "[0-9.]*"/id("com.android.application") version "8.7.0"/' android/settings.gradle.kts 2>/dev/null || true
          sed -i "s/id 'com.android.application' version '[0-9.]*'/id 'com.android.application' version '8.7.0'/" android/settings.gradle 2>/dev/null || true
          echo "--- wrapper ---"; grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties
          echo "--- agp ---"; grep -rh "com.android.application" android/settings.gradle* || true

      - name: Configure AdMob (Android) — app-id meta-data, INTERNET, minSdk 23
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # AdMob requires minSdk 23
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts 2>/dev/null || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle 2>/dev/null || true
          # INTERNET permission (before <application>)
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$MANIFEST"
          # AdMob application id meta-data (inside <application>)
          grep -q 'com.google.android.gms.ads.APPLICATION_ID' "$MANIFEST" || \
            sed -i 's#</application>#    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-1298950542115439~5662432931"/>\n    </application>#' "$MANIFEST"
          echo "--- manifest ---"; grep -nE "INTERNET|APPLICATION_ID" "$MANIFEST" || true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true

      - name: Static analysis (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Tests
        run: |
          rm -f test/widget_test.dart   # remove the stub flutter-create generates (refs MyApp)
          flutter test test/score_engine_test.dart   # unit tests only; screenshot capture has its own workflow

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: beat-nusantara-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
