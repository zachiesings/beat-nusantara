name: beat_nusantara
description: Beat Nusantara — game ritme premium dengan rasa Nusantara.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2          # simple, CI-stable state management (justified: minimal surface, no codegen)
  shared_preferences: ^2.2.2 # local persistence (progress, settings, unlocks, scores)
  audioplayers: ^6.1.0       # song + SFX playback (proven on this build pipeline)
  google_mobile_ads: '>=5.3.0 <7.0.0'  # rewarded ads; >=5.3 for modern-Gradle compat (App ID injected by CI)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color: "#0B0B18"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/songs/
    - assets/audio/sfx/
    - assets/audio/bgm/
    - assets/charts/
    - assets/images/
    - assets/icon/
    - assets/song_manifest.json
  fonts:
    - family: Jakarta
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
